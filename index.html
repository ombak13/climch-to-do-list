<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TaskBoard">
<meta name="theme-color" content="#0F2044">
<title>TaskBoard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0F2044;--teal:#028090;--teal-lt:#DFF4F6;
  --red:#C94040;--red-lt:#FDEAEA;--blue:#1A5FAD;--blue-lt:#E3EEF9;
  --green:#1A8A4A;--green-lt:#E3F5EC;--purple:#5B3FA0;--purple-lt:#EEE9F8;
  --amber:#B07D2A;--amber-lt:#FBF0DC;--orange:#D46B0A;--orange-lt:#FEF0DE;
  --g50:#F8F9FB;--g100:#F0F2F5;--g200:#E2E6EC;--g300:#C8CDD6;
  --g400:#9BA4B2;--g500:#7A8592;--g600:#4A5260;--g700:#2D3340;--g800:#1A1F28;
  --white:#fff;--r:10px;--rsm:6px;
  --sh-sm:0 1px 4px rgba(15,32,68,.09);
  --sh-md:0 4px 16px rgba(15,32,68,.12);
  --sh-lg:0 16px 40px rgba(15,32,68,.2);
  --font:'DM Sans',-apple-system,sans-serif;
  --safe-t:env(safe-area-inset-top,0px);
  --safe-b:env(safe-area-inset-bottom,0px);
  --nav-h:62px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%;height:100dvh}
body{font-family:var(--font);background:var(--g50);color:var(--g800);
  display:flex;height:100%;height:100dvh;overflow:hidden;font-size:14px;line-height:1.5;
  -webkit-text-size-adjust:100%;text-size-adjust:100%}

/* ──────────────────────────────────────────────────────
   SIDEBAR (desktop only)
────────────────────────────────────────────────────── */
.sidebar{width:220px;background:var(--navy);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.sb-top{padding:16px 14px 13px;border-bottom:1px solid rgba(255,255,255,.09)}
.sb-logo{font-size:15px;font-weight:700;color:#fff;display:flex;align-items:center;gap:7px}
.sb-icon{width:26px;height:26px;border-radius:7px;background:var(--teal);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.sb-date{font-size:11px;color:rgba(255,255,255,.38);margin-top:3px;padding-left:33px}
.sb-nav{padding:10px 8px;flex:1;overflow-y:auto}
.sb-label{font-size:10px;font-weight:700;letter-spacing:.09em;color:rgba(255,255,255,.3);text-transform:uppercase;padding:8px 8px 4px}
.ni{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--rsm);color:rgba(255,255,255,.6);cursor:pointer;font-size:13px;font-weight:450;margin-bottom:2px;min-height:44px;transition:all .14s}
.ni:hover{background:rgba(255,255,255,.09);color:rgba(255,255,255,.9)}
.ni.active{background:rgba(255,255,255,.14);color:#fff;font-weight:600}
.ni svg{width:15px;height:15px;flex-shrink:0;opacity:.85}
.ni .nb{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;min-width:18px;text-align:center;display:none}
.nb.tl{background:var(--teal)}
.sb-projs{padding:0 8px 8px}
.pnav{display:flex;align-items:center;gap:7px;padding:6px 10px;border-radius:var(--rsm);color:rgba(255,255,255,.5);cursor:pointer;font-size:12px;min-height:36px;transition:all .13s;margin-bottom:1px}
.pnav:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.85)}
.pdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sb-btn{margin:10px 10px 12px;padding:11px 14px;background:var(--teal);color:#fff;border:none;border-radius:var(--r);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:7px;width:calc(100% - 20px)}
.sb-btn:hover{background:#029aaa}

/* ──────────────────────────────────────────────────────
   MAIN WRAPPER
────────────────────────────────────────────────────── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* ──────────────────────────────────────────────────────
   TOP HEADER
────────────────────────────────────────────────────── */
.top-hdr{background:var(--white);border-bottom:1px solid var(--g200);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.top-hdr h1{font-size:17px;font-weight:700;color:var(--navy)}
.hdr-a{display:flex;gap:7px}
.btn-sec{padding:7px 13px;background:var(--g100);color:var(--g600);border:1px solid var(--g200);border-radius:var(--rsm);font-family:var(--font);font-size:12px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:5px;min-height:36px}
.btn-sec:hover{background:var(--g200)}
.btn-pri{padding:7px 14px;background:var(--teal);color:#fff;border:none;border-radius:var(--rsm);font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;min-height:36px}
.btn-pri:hover{background:#029aaa}

/* ──────────────────────────────────────────────────────
   DASHBOARD
────────────────────────────────────────────────────── */
.dashboard{background:var(--white);border-bottom:1px solid var(--g200);padding:10px 20px;display:flex;gap:9px;flex-shrink:0}
.dc{flex:1;display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:var(--r);cursor:pointer;border:1px solid transparent}
.dc.ov{background:var(--red-lt);border-color:#F0C8C8}
.dc.td{background:var(--blue-lt);border-color:#BDD4F0}
.dc.wk{background:var(--purple-lt);border-color:#D0C5EC}
.dc.wt{background:var(--amber-lt);border-color:#E8C88A}
.dc-n{font-size:24px;font-weight:700;line-height:1;font-variant-numeric:tabular-nums}
.ov .dc-n{color:var(--red)}.td .dc-n{color:var(--blue)}.wk .dc-n{color:var(--purple)}.wt .dc-n{color:var(--amber)}
.dc-l{font-size:10.5px;font-weight:500;color:var(--g600);line-height:1.3}

/* ──────────────────────────────────────────────────────
   CONTENT AREA
────────────────────────────────────────────────────── */
.content{flex:1;overflow-y:auto;padding:16px 20px;-webkit-overflow-scrolling:touch}

/* ──────────────────────────────────────────────────────
   FILTER BAR
────────────────────────────────────────────────────── */
.fbar{display:flex;gap:5px;align-items:center;flex-wrap:wrap;margin-bottom:14px;padding:9px 12px;background:var(--white);border:1px solid var(--g200);border-radius:var(--r)}
.flbl{font-size:10.5px;font-weight:700;color:var(--g400);text-transform:uppercase;letter-spacing:.07em;white-space:nowrap}
.fchip{padding:5px 11px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--g200);background:var(--white);color:var(--g600);white-space:nowrap;min-height:30px;display:inline-flex;align-items:center}
.fchip.on{background:var(--navy);border-color:var(--navy);color:#fff}
.fsep{width:1px;height:16px;background:var(--g200);margin:0 2px;flex-shrink:0}

/* ──────────────────────────────────────────────────────
   SECTION HEADER
────────────────────────────────────────────────────── */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;margin-top:18px}
.sec-t{font-size:11px;font-weight:700;color:var(--g400);text-transform:uppercase;letter-spacing:.08em}
.sec-c{font-size:11px;color:var(--g400)}

/* ──────────────────────────────────────────────────────
   TASK CARDS
────────────────────────────────────────────────────── */
.tlist{display:flex;flex-direction:column;gap:5px;margin-bottom:4px}
.tcard{background:var(--white);border-radius:var(--r);padding:11px 12px 11px 17px;border:1px solid var(--g200);display:flex;align-items:flex-start;gap:9px;cursor:pointer;position:relative}
.tcard:hover{border-color:var(--g300);box-shadow:var(--sh-sm)}
.tcard.dn{opacity:.5}
.pbar{position:absolute;left:0;top:6px;bottom:6px;width:3px;border-radius:3px}
.pbar.h{background:var(--red)}.pbar.n{background:var(--blue)}.pbar.l{background:var(--g300)}
.tchk{width:20px;height:20px;border-radius:5px;border:2px solid var(--g300);flex-shrink:0;margin-top:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;background:#fff;transition:all .12s}
.tchk:hover,.tchk:active{border-color:var(--teal)}
.tchk.ckd{background:var(--teal);border-color:var(--teal)}
.tchk.ckd::after{content:'';width:9px;height:5px;border-left:2.5px solid #fff;border-bottom:2.5px solid #fff;transform:rotate(-45deg) translateY(-1px);display:block}
.tbody{flex:1;min-width:0}
.tt{font-size:14px;font-weight:500;color:var(--g800);margin-bottom:5px;line-height:1.4}
.dn .tt{text-decoration:line-through;color:var(--g400)}
.tmeta{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.tnote{font-size:12px;color:var(--g500);margin-top:3px;font-style:italic;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%}
.pill{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:500;padding:2px 7px;border-radius:10px;white-space:nowrap}
.pp{background:var(--g100);color:var(--g600)}
.phi{background:var(--red-lt);color:var(--red)}
.pnm{background:var(--blue-lt);color:var(--blue)}
.plo{background:var(--g100);color:var(--g500)}
.pdue{color:var(--g500)}
.pdue.ov{background:var(--red-lt);color:var(--red)}
.pdue.td{background:var(--blue-lt);color:var(--blue)}
.pip{background:var(--orange-lt);color:var(--orange)}
.pext{background:var(--purple-lt);color:var(--purple)}
.tacts{display:flex;gap:2px;align-items:center;flex-shrink:0}
.ta{width:34px;height:34px;border-radius:var(--rsm);border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--g400);font-size:15px;padding:0}
.ta:hover,.ta:active{background:var(--g100);color:var(--g700)}
.ta.sun:hover,.ta.sun:active{background:var(--blue-lt);color:var(--blue)}
.ta.del:hover,.ta.del:active{background:var(--red-lt);color:var(--red)}

/* ──────────────────────────────────────────────────────
   PROJECTS
────────────────────────────────────────────────────── */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:13px}
.pcard{background:var(--white);border-radius:var(--r);border:1px solid var(--g200);overflow:hidden;cursor:pointer;transition:all .16s}
.pcard:hover,.pcard:active{box-shadow:var(--sh-md);border-color:var(--g300)}
.pcard-h{padding:13px 15px 11px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--g100)}
.pcard-ico{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.pcard-n{font-size:13.5px;font-weight:600;color:var(--g800)}
.pcard-ct{font-size:11px;color:var(--g400)}
.pcard-b{padding:11px 15px}
.pstats{display:flex;gap:12px;margin-bottom:10px}
.psn{font-size:22px;font-weight:700;line-height:1}
.psl{font-size:10px;color:var(--g400);font-weight:500;margin-top:1px}
.pbar2{height:3px;background:var(--g100);border-radius:3px;margin-bottom:10px;overflow:hidden}
.pbfill{height:100%;border-radius:3px}
.ptp{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--g600);margin-bottom:4px}
.pcard-f{padding:8px 15px;background:var(--g50);border-top:1px solid var(--g100);display:flex;gap:6px}
.pab{padding:5px 12px;border-radius:5px;font-family:var(--font);font-size:11.5px;font-weight:500;cursor:pointer;border:1px solid var(--g200);background:#fff;color:var(--g600);min-height:34px}
.pab:hover,.pab:active{background:var(--g100)}
.pab.dng:hover,.pab.dng:active{background:var(--red-lt);border-color:#F0C8C8;color:var(--red)}
.add-pc{background:var(--g50);border:1.5px dashed var(--g300);border-radius:var(--r);padding:28px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;color:var(--g400);min-height:120px}
.add-pc:hover,.add-pc:active{border-color:var(--teal);color:var(--teal);background:var(--teal-lt)}
.add-pc span{font-size:13px;font-weight:500}

/* ──────────────────────────────────────────────────────
   PROJECT DETAIL
────────────────────────────────────────────────────── */
.pd-hdr{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.btn-back{display:flex;align-items:center;gap:5px;padding:8px 14px;background:var(--white);border:1px solid var(--g200);border-radius:var(--rsm);font-family:var(--font);font-size:13px;font-weight:500;color:var(--g600);cursor:pointer;min-height:40px}
.btn-back:active{background:var(--g100)}
.bc{font-size:13px;color:var(--g400)}
.bc strong{color:var(--g700)}
.pd-banner{background:var(--white);border:1px solid var(--g200);border-radius:var(--r);padding:16px;margin-bottom:18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.pdb-ico{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.pdb-name{font-size:17px;font-weight:700;color:var(--navy)}
.pdb-sub{font-size:12px;color:var(--g400);margin-top:3px}
.pdb-stats{display:flex;gap:16px;margin-left:auto;align-items:center;flex-wrap:wrap}
.pds{text-align:center}
.pds-n{font-size:22px;font-weight:700;line-height:1}
.pds-l{font-size:10.5px;color:var(--g400);font-weight:500;margin-top:2px}
.pdb-prog{width:100px}
.pdb-prog-lbl{font-size:11px;font-weight:700;text-align:right;margin-bottom:3px}
.pdb-bar{height:5px;background:var(--g100);border-radius:5px;overflow:hidden}
.pdb-fill{height:100%;border-radius:5px}

/* ──────────────────────────────────────────────────────
   KANBAN
────────────────────────────────────────────────────── */
.k-tabs{display:none;margin-bottom:12px;background:var(--white);border:1px solid var(--g200);border-radius:var(--r);overflow:hidden;flex-shrink:0}
.k-tab-row{display:flex}
.k-tab{flex:1;padding:11px 8px;text-align:center;font-size:12px;font-weight:600;color:var(--g400);cursor:pointer;border-right:1px solid var(--g200)}
.k-tab:last-child{border-right:none}
.k-tab.on{background:var(--navy);color:#fff}
.kboard{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;flex:1;overflow:hidden}
.kcol{background:var(--g100);border-radius:var(--r);display:flex;flex-direction:column;overflow:hidden;border:1px solid var(--g200)}
.kcol-hdr{padding:10px 12px;display:flex;align-items:center;gap:8px;background:var(--white);border-bottom:1px solid var(--g200)}
.kdot{width:9px;height:9px;border-radius:50%}
.k-todo .kdot{background:var(--g400)}.k-ip .kdot{background:var(--blue)}.k-dn .kdot{background:var(--green)}
.kcol-t{font-size:12.5px;font-weight:700;color:var(--g700)}
.kcol-c{margin-left:auto;background:var(--g100);color:var(--g500);font-size:10.5px;font-weight:600;padding:1px 7px;border-radius:10px}
.ktasks{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:6px;-webkit-overflow-scrolling:touch}
.kcard{background:#fff;border-radius:var(--rsm);padding:10px 11px;border:1px solid var(--g200);cursor:pointer}
.kcard:active{box-shadow:var(--sh-sm)}
.kcard-t{font-size:13px;font-weight:500;color:var(--g800);margin-bottom:6px;line-height:1.4}
.kcard-m{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.avy{width:22px;height:22px;border-radius:50%;background:var(--g200);color:var(--g600);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.avy.ext{background:var(--purple-lt);color:var(--purple)}
.k-empty{text-align:center;padding:20px;color:var(--g300);font-size:12px}

/* ──────────────────────────────────────────────────────
   MODALS
────────────────────────────────────────────────────── */
.mov{position:fixed;inset:0;background:rgba(15,32,68,.5);-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .22s}
.mov.open{opacity:1;pointer-events:auto}
.modal{background:#fff;width:100%;max-width:560px;max-height:92dvh;overflow-y:auto;-webkit-overflow-scrolling:touch;box-shadow:var(--sh-lg);transform:translateY(100%);transition:transform .3s cubic-bezier(.32,1,.23,1);padding-bottom:var(--safe-b);border-radius:20px 20px 0 0}
.mov.open .modal{transform:translateY(0)}
.modal-pill{width:40px;height:4px;border-radius:2px;background:var(--g300);margin:10px auto 0}
.mhdr{padding:16px 20px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--g200)}
.mtitle{font-size:16px;font-weight:700;color:var(--navy)}
.mcls{width:32px;height:32px;border-radius:var(--rsm);border:none;background:var(--g100);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--g500);font-size:18px;font-family:inherit}
.mbody{padding:16px 20px}
.fr{margin-bottom:14px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
label{display:block;font-size:11px;font-weight:700;color:var(--g600);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
input[type=text],input[type=date],select,textarea{width:100%;padding:11px 12px;border:1.5px solid var(--g200);border-radius:var(--rsm);font-family:var(--font);font-size:16px;color:var(--g800);background:#fff;outline:none;-webkit-appearance:none;appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(2,128,144,.1)}
textarea{resize:none;min-height:72px}
.psel{display:flex;gap:7px}
.pio{flex:1;padding:11px 6px;border-radius:var(--rsm);border:1.5px solid var(--g200);cursor:pointer;text-align:center;font-size:13px;font-weight:500;user-select:none;min-height:46px;display:flex;align-items:center;justify-content:center}
.pio.h{border-color:#F0C8C8;color:var(--red);background:var(--red-lt)}
.pio.n{border-color:#BDD4F0;color:var(--blue);background:var(--blue-lt)}
.pio.l{border-color:var(--g200);color:var(--g500);background:var(--g50)}
.pio.h.sel{background:var(--red);color:#fff;border-color:var(--red)}
.pio.n.sel{background:var(--blue);color:#fff;border-color:var(--blue)}
.pio.l.sel{background:var(--g500);color:#fff;border-color:var(--g500)}
.ckr{display:flex;align-items:center;gap:10px;cursor:pointer;padding:8px 0;min-height:44px}
.ckr input{width:20px;height:20px;cursor:pointer;flex-shrink:0;accent-color:var(--teal)}
.ckr span{font-size:14px;color:var(--g700)}
.mft{padding:12px 20px;border-top:1px solid var(--g200);display:flex;gap:8px}
.bsv{flex:1;padding:14px;background:var(--teal);color:#fff;border:none;border-radius:var(--r);font-family:var(--font);font-size:15px;font-weight:600;cursor:pointer}
.bsv:active{background:#029aaa}
.bcn{padding:14px 18px;background:var(--g100);color:var(--g600);border:1px solid var(--g200);border-radius:var(--r);font-family:var(--font);font-size:15px;font-weight:500;cursor:pointer}
.bcn:active{background:var(--g200)}
.swatches{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.sw{width:32px;height:32px;border-radius:8px;cursor:pointer;border:3px solid transparent}
.sw.sel{border-color:var(--g700);transform:scale(1.15)}
.epick{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.ep{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:7px;cursor:pointer;font-size:18px;border:2px solid transparent}
.ep.sel{border-color:var(--teal);background:var(--teal-lt)}

/* ──────────────────────────────────────────────────────
   EMPTY STATE
────────────────────────────────────────────────────── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 20px;text-align:center;gap:6px}
.eit{font-size:40px;margin-bottom:4px}
.et{font-size:15px;font-weight:600;color:var(--g500)}
.es{font-size:13px;color:var(--g400);max-width:260px;line-height:1.5}
.today-d{font-size:13px;color:var(--g400);text-transform:capitalize;margin-bottom:16px;display:block}

/* ──────────────────────────────────────────────────────
   TOAST
────────────────────────────────────────────────────── */
.toast{position:fixed;bottom:calc(24px + var(--safe-b));left:50%;transform:translateX(-50%) translateY(12px);background:var(--navy);color:#fff;padding:11px 18px;border-radius:30px;font-size:13px;font-weight:500;box-shadow:var(--sh-md);z-index:300;opacity:0;transition:all .22s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ──────────────────────────────────────────────────────
   BOTTOM NAV — position: fixed, toujours en bas
────────────────────────────────────────────────────── */
.bot-nav{
  display:none; /* visible uniquement via media query mobile */
  position:fixed;
  bottom:0;left:0;right:0;
  z-index:50;
  background:var(--white);
  border-top:1px solid var(--g200);
  padding-bottom:var(--safe-b);
}
.bn-row{display:flex;align-items:stretch}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px;cursor:pointer;color:var(--g400);min-height:52px;position:relative;border:none;background:none;font-family:var(--font)}
.bn-item.active{color:var(--teal)}
.bn-ico{font-size:22px;line-height:1;margin-bottom:2px}
.bn-lbl{font-size:10px;font-weight:600}
.bn-badge{position:absolute;top:4px;right:calc(50% - 18px);background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:10px;min-width:16px;text-align:center;display:none}
.bn-badge.tl{background:var(--teal)}
.bn-plus{flex:1;display:flex;align-items:center;justify-content:center;padding-bottom:4px}
.bn-plus-btn{width:50px;height:50px;border-radius:50%;background:var(--teal);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(2,128,144,.4);color:#fff;font-size:26px;font-weight:300;line-height:1;margin-top:-8px}
.bn-plus-btn:active{background:#029aaa;transform:scale(.94)}

/* ──────────────────────────────────────────────────────
   RESPONSIVE — MOBILE
────────────────────────────────────────────────────── */
@media(max-width:767px){
  /* Sidebar complètement cachée */
  .sidebar{display:none!important}

  /* Bottom nav visible */
  .bot-nav{display:block}

  /* Compenser la hauteur du bottom nav */
  .content{padding:14px 14px calc(80px + var(--safe-b)) 14px}

  /* Header compact */
  .top-hdr{padding:0 14px;padding-top:var(--safe-t)}
  .top-hdr h1{font-size:16px}
  .btn-export-desk{display:none}

  /* Dashboard 2×2 sur mobile */
  .dashboard{padding:8px 12px;gap:7px;flex-wrap:wrap}
  .dc{flex:calc(50% - 4px);max-width:calc(50% - 4px);padding:8px 10px;gap:7px}
  .dc-n{font-size:20px}
  .dc-l{font-size:10px}

  /* Projets : 1 colonne */
  .pgrid{grid-template-columns:1fr}

  /* Detail projet : stats en dessous */
  .pdb-stats{margin-left:0;width:100%;justify-content:space-between}
  .bc{display:none}

  /* Kanban : onglets au lieu des colonnes */
  .k-tabs{display:block}
  .kboard{grid-template-columns:1fr;display:block}
  .kcol{display:none;min-height:200px}
  .kcol.k-active{display:flex}

  /* Task actions : toujours visibles (pas de hover sur tactile) */
  .tacts{opacity:1!important}
  .ta{width:38px;height:38px;font-size:16px}

  /* Filtres : scroll horizontal */
  .fbar{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;gap:4px;padding:8px 10px}
  .fbar::-webkit-scrollbar{display:none}
  .flbl{display:none}
  .fsep{display:none}
}

/* ──────────────────────────────────────────────────────
   RESPONSIVE — DESKTOP
────────────────────────────────────────────────────── */
@media(min-width:768px){
  /* Modales centrées sur desktop */
  .mov{align-items:center}
  .modal{border-radius:14px;max-width:520px;transform:translateY(14px) scale(.97);padding-bottom:0}
  .mov.open .modal{transform:translateY(0) scale(1)}
  .modal-pill{display:none}

  /* Colonnes Kanban sur desktop */
  .k-tabs{display:none!important}
  .kcol{display:flex!important}

  /* Hover actions sur desktop */
  .tacts{opacity:0;transition:opacity .13s}
  .tcard:hover .tacts{opacity:1}

  /* Kanban layout */
  .content.kanban-view{display:flex;flex-direction:column}
  .kboard{flex:1;overflow:hidden}
}
</style>
</head>
<body>

<!-- ── SIDEBAR (desktop) ── -->
<nav class="sidebar">
  <div class="sb-top">
    <div class="sb-logo"><div class="sb-icon">📋</div>TaskBoard</div>
    <div class="sb-date" id="sb-date"></div>
  </div>
  <div class="sb-nav">
    <div class="sb-label">Vues</div>
    <div class="ni active" id="nav-today" onclick="switchTab('today')">
      <svg viewBox="0 0 20 20" fill="none"><rect x="3" y="4" width="14" height="13" rx="2" stroke="currentColor" stroke-width="1.7"/><path d="M7 2v3M13 2v3" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M3 8h14" stroke="currentColor" stroke-width="1.5"/><path d="M7 12h6M7 15h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      Aujourd'hui <span class="nb" id="nb-td"></span>
    </div>
    <div class="ni" id="nav-all" onclick="switchTab('all')">
      <svg viewBox="0 0 20 20" fill="none"><path d="M4 6h12M4 10h12M4 14h8" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
      Toutes les tâches <span class="nb tl" id="nb-all"></span>
    </div>
    <div class="ni" id="nav-projects" onclick="switchTab('projects')">
      <svg viewBox="0 0 20 20" fill="none"><rect x="2" y="2" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.7"/><rect x="11" y="2" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.7"/><rect x="2" y="11" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.7"/><rect x="11" y="11" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.7"/></svg>
      Projets
    </div>
    <div class="ni" id="nav-kanban" onclick="switchTab('kanban')">
      <svg viewBox="0 0 20 20" fill="none"><rect x="2" y="3" width="4.5" height="13" rx="1.5" stroke="currentColor" stroke-width="1.7"/><rect x="7.75" y="3" width="4.5" height="9" rx="1.5" stroke="currentColor" stroke-width="1.7"/><rect x="13.5" y="3" width="4.5" height="6" rx="1.5" stroke="currentColor" stroke-width="1.7"/></svg>
      Kanban
    </div>
  </div>
  <div class="sb-projs" id="sb-projs"></div>
  <button class="sb-btn" onclick="openTaskModal()">
    <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1v11M1 6.5h11" stroke="white" stroke-width="2.2" stroke-linecap="round"/></svg>
    Nouvelle tâche
  </button>
</nav>

<!-- ── MAIN ── -->
<div class="main">
  <div class="top-hdr">
    <h1 id="page-title">Aujourd'hui</h1>
    <div class="hdr-a">
      <button class="btn-sec btn-export-desk" onclick="exportJSON()">↓ Export</button>
      <button class="btn-pri" onclick="openTaskModal()">+ Nouvelle tâche</button>
    </div>
  </div>
  <div class="dashboard">
    <div class="dc ov" onclick="gotoOv()"><div class="dc-n" id="d-ov">0</div><div class="dc-l">En retard</div></div>
    <div class="dc td"><div class="dc-n" id="d-td">0</div><div class="dc-l">Aujourd'hui</div></div>
    <div class="dc wk"><div class="dc-n" id="d-wk">0</div><div class="dc-l">Cette semaine</div></div>
    <div class="dc wt"><div class="dc-n" id="d-wt">0</div><div class="dc-l">En attente</div></div>
  </div>
  <div class="content" id="content"></div>
</div>

<!-- ── BOTTOM NAV (mobile, position:fixed) ── -->
<div class="bot-nav">
  <div class="bn-row">
    <button class="bn-item active" id="bn-today" onclick="switchTab('today')">
      <div class="bn-ico">📅</div><div class="bn-lbl">Aujourd'hui</div>
      <div class="bn-badge" id="bn-b-td"></div>
    </button>
    <button class="bn-item" id="bn-all" onclick="switchTab('all')">
      <div class="bn-ico">📋</div><div class="bn-lbl">Toutes</div>
      <div class="bn-badge tl" id="bn-b-all"></div>
    </button>
    <div class="bn-plus"><button class="bn-plus-btn" onclick="openTaskModal()">＋</button></div>
    <button class="bn-item" id="bn-projects" onclick="switchTab('projects')">
      <div class="bn-ico">🗂</div><div class="bn-lbl">Projets</div>
    </button>
    <button class="bn-item" id="bn-kanban" onclick="switchTab('kanban')">
      <div class="bn-ico">⬜</div><div class="bn-lbl">Kanban</div>
    </button>
  </div>
</div>

<!-- ── TASK MODAL ── -->
<div class="mov" id="task-ov" onclick="ovClick(event,'task-ov')">
  <div class="modal">
    <div class="modal-pill"></div>
    <div class="mhdr"><div class="mtitle" id="m-title">Nouvelle tâche</div><button class="mcls" onclick="closeTaskModal()">×</button></div>
    <div class="mbody">
      <div class="fr"><label>Titre *</label><input type="text" id="f-title" placeholder="Titre de la tâche…" autocomplete="off" autocorrect="off" autocapitalize="sentences"></div>
      <div class="fg">
        <div><label>Projet</label><select id="f-proj"></select></div>
        <div><label>Assigné à</label><input type="text" id="f-assign" placeholder="Moi" autocomplete="off"></div>
      </div>
      <div class="fr"><label>Priorité</label>
        <div class="psel">
          <div class="pio h sel" onclick="selPrio('h')">🔴 Haute</div>
          <div class="pio n" onclick="selPrio('n')">🔵 Normale</div>
          <div class="pio l" onclick="selPrio('l')">⚪ Basse</div>
        </div>
      </div>
      <div class="fg">
        <div><label>Échéance</label><input type="date" id="f-due"></div>
        <div><label>Statut</label>
          <select id="f-status">
            <option value="todo">À faire</option>
            <option value="in-progress">En cours</option>
            <option value="done">Terminé</option>
          </select>
        </div>
      </div>
      <div class="fr"><label>Note</label><textarea id="f-notes" placeholder="Contexte, détails…"></textarea></div>
      <label class="ckr"><input type="checkbox" id="f-today"><span>☀️ Ajouter à ma journée</span></label>
    </div>
    <div class="mft"><button class="bcn" onclick="closeTaskModal()">Annuler</button><button class="bsv" onclick="saveTask()">Enregistrer</button></div>
  </div>
</div>

<!-- ── PROJECT MODAL ── -->
<div class="mov" id="proj-ov" onclick="ovClick(event,'proj-ov')">
  <div class="modal">
    <div class="modal-pill"></div>
    <div class="mhdr"><div class="mtitle" id="pm-title">Nouveau projet</div><button class="mcls" onclick="closeProjModal()">×</button></div>
    <div class="mbody">
      <div class="fr"><label>Nom *</label><input type="text" id="fp-name" placeholder="Nom du projet…" autocapitalize="words"></div>
      <div class="fr"><label>Couleur</label><div class="swatches" id="swatches"></div></div>
      <div class="fr"><label>Icône</label><div class="epick" id="epick"></div></div>
    </div>
    <div class="mft"><button class="bcn" onclick="closeProjModal()">Annuler</button><button class="bsv" onclick="saveProj()">Créer</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════ CONSTANTS ═══════════════════
const COLORS=['#028090','#0F2044','#5B3FA0','#C94040','#B07D2A','#1A5FAD','#1A8A4A','#D46B0A','#7A4B9A','#2A7AB0'];
const EMOJIS=['📋','🎯','💊','🧬','🏥','📊','📈','💼','🔬','📌','⚡','🌍','🤝','📣','💡','🗂','🔖','🏆'];
const PL={h:'Haute',n:'Normale',l:'Basse'};
const SL={'todo':'À faire','in-progress':'En cours','done':'Terminé'};

// ═══════════════════ STATE ═══════════════════
const S={
  tasks:[],projects:[],
  tab:'today',
  fil:{prio:'all',status:'all',who:'all',proj:'all'},
  editTaskId:null,editProjId:null,
  prio:'h',pColor:'#028090',pEmoji:'📋',
  defProjId:null,projDetailId:null,kTab:'todo'
};

// ═══════════════════ STORAGE ═══════════════════
function save(){
  try{
    localStorage.setItem('tb_tasks',JSON.stringify(S.tasks));
    localStorage.setItem('tb_projs',JSON.stringify(S.projects));
  }catch(e){toast('⚠️ Erreur sauvegarde');}
}
function load(){
  try{
    const t=localStorage.getItem('tb_tasks');
    const p=localStorage.getItem('tb_projs');
    if(t)S.tasks=JSON.parse(t);
    if(p)S.projects=JSON.parse(p);
  }catch(e){S.tasks=[];S.projects=[];}
}

// ═══════════════════ UTILS ═══════════════════
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function todayStr(){return new Date().toISOString().slice(0,10);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function gp(id){return S.projects.find(p=>p.id===id);}
function isExt(t){return !!(t.assignee&&t.assignee.toLowerCase()!=='moi'&&t.assignee!=='');}
function ini(n){if(!n||n.toLowerCase()==='moi')return 'M';return n.split(/\s+/).map(w=>w[0]).join('').toUpperCase().slice(0,2);}
function fmtD(ds){
  if(!ds)return '';
  const d=new Date(ds+'T00:00:00'),now=new Date();now.setHours(0,0,0,0);
  const diff=Math.round((d-now)/86400000);
  if(diff<-1)return 'Il y a '+Math.abs(diff)+'j';
  if(diff===-1)return 'Hier';
  if(diff===0)return "Aujourd'hui";
  if(diff===1)return 'Demain';
  if(diff<=6)return 'Dans '+diff+'j';
  return d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'});
}
function isOv(t){return !!(t.dueDate&&t.status!=='done'&&t.dueDate<todayStr());}
function isTd(t){return t.status!=='done'&&(!!t.inToday||t.dueDate===todayStr());}
function isWk(t){
  if(!t.dueDate||t.status==='done')return false;
  const now=new Date();now.setHours(0,0,0,0);
  const diff=Math.round((new Date(t.dueDate+'T00:00:00')-now)/86400000);
  return diff>=0&&diff<=7;
}
function dcls(t){if(!t.dueDate)return '';if(isOv(t))return 'ov';if(t.dueDate===todayStr())return 'td';return '';}
function pcls(p){return p==='h'?'phi':p==='n'?'pnm':'plo';}
function sortTasks(arr){
  return arr.sort((a,b)=>{
    const r=t=>isOv(t)?0:t.status==='in-progress'?1:t.status==='todo'?2:3;
    if(r(a)!==r(b))return r(a)-r(b);
    if(a.dueDate&&b.dueDate)return a.dueDate.localeCompare(b.dueDate);
    if(a.dueDate)return -1;if(b.dueDate)return 1;
    return 0;
  });
}

// ═══════════════════ TOAST ═══════════════════
function toast(msg,ms=2400){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),ms);
}

// ═══════════════════ DASHBOARD & SIDEBAR ═══════════════════
function updateDash(){
  const a=S.tasks.filter(t=>t.status!=='done');
  const nov=a.filter(isOv).length,ntd=a.filter(isTd).length,nwk=a.filter(isWk).length,nwt=S.tasks.filter(t=>t.status!=='done'&&isExt(t)).length;
  document.getElementById('d-ov').textContent=nov;
  document.getElementById('d-td').textContent=ntd;
  document.getElementById('d-wk').textContent=nwk;
  document.getElementById('d-wt').textContent=nwt;
  // Desktop badges
  const nd=document.getElementById('nb-td'),na=document.getElementById('nb-all');
  if(nd){nd.textContent=ntd;nd.style.display=ntd?'':'none';}
  if(na){na.textContent=a.length;na.style.display=a.length?'':'none';}
  // Mobile badges
  const mb1=document.getElementById('bn-b-td'),mb2=document.getElementById('bn-b-all');
  if(mb1){mb1.textContent=ntd;mb1.style.display=ntd?'':'none';}
  if(mb2){mb2.textContent=a.length;mb2.style.display=a.length?'':'none';}
}
function updateSide(){
  const el=document.getElementById('sb-projs');if(!el)return;
  const act=S.projects.filter(p=>!p.archived);
  if(!act.length){el.innerHTML='';return;}
  el.innerHTML='<div class="sb-label" style="padding:6px 8px 3px">Projets</div>'+
    act.map(p=>'<div class="pnav" onclick="openProjFromSide(\''+p.id+'\')"><span class="pdot" style="background:'+p.color+'"></span><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+p.emoji+' '+esc(p.name)+'</span></div>').join('');
}
function openProjFromSide(id){switchTab('projects');S.projDetailId=id;renderContent();}

// ═══════════════════ TAB ═══════════════════
function switchTab(tab){
  S.tab=tab;S.fil={prio:'all',status:'all',who:'all',proj:'all'};S.projDetailId=null;
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('active'));
  document.querySelectorAll('.bn-item').forEach(n=>n.classList.remove('active'));
  const dn=document.getElementById('nav-'+tab);if(dn)dn.classList.add('active');
  const bn=document.getElementById('bn-'+tab);if(bn)bn.classList.add('active');
  const titles={today:"Aujourd'hui",all:'Toutes les tâches',projects:'Projets',kanban:'Kanban'};
  document.getElementById('page-title').textContent=titles[tab];
  const c=document.getElementById('content');
  if(tab==='kanban')c.classList.add('kanban-view');else c.classList.remove('kanban-view');
  renderContent();
}

// ═══════════════════ RENDER ═══════════════════
function renderAll(){updateDash();updateSide();renderContent();}
function renderContent(){
  const c=document.getElementById('content');
  if(S.tab==='today')c.innerHTML=renderToday();
  else if(S.tab==='all')c.innerHTML=renderAll2();
  else if(S.tab==='projects')c.innerHTML=renderProj();
  else c.innerHTML=renderKanban();
}

// ═══════════════════ TODAY ═══════════════════
function renderToday(){
  const ds=new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
  const ov=S.tasks.filter(isOv);
  const tod=S.tasks.filter(t=>isTd(t)&&t.status!=='done');
  const dn=S.tasks.filter(t=>isTd(t)&&t.status==='done');
  let h='<span class="today-d">'+ds+'</span>';
  if(ov.length)h+=sh('🔴 En retard','var(--red)',ov.length)+'<div class="tlist">'+ov.map(tc).join('')+'</div>';
  if(tod.length)h+=sh('📋 Ma journée','',tod.length)+'<div class="tlist">'+tod.map(tc).join('')+'</div>';
  else if(!ov.length)h+='<div class="empty"><div class="eit">✨</div><div class="et">Journée libre</div><div class="es">Appuyez sur ☀️ dans une tâche pour l\'ajouter ici.</div></div>';
  if(dn.length)h+=sh('✅ Terminé','var(--green)',dn.length)+'<div class="tlist">'+dn.map(tc).join('')+'</div>';
  return h;
}

// ═══════════════════ ALL TASKS ═══════════════════
function renderAll2(){
  let tasks=sortTasks([...S.tasks]);
  const f=S.fil;
  if(f.prio!=='all')tasks=tasks.filter(t=>t.priority===f.prio);
  if(f.status!=='all')tasks=tasks.filter(t=>t.status===f.status);
  if(f.who==='moi')tasks=tasks.filter(t=>!isExt(t));
  if(f.who==='others')tasks=tasks.filter(isExt);
  if(f.proj!=='all')tasks=tasks.filter(t=>t.projectId===f.proj);
  const ap=S.projects.filter(p=>!p.archived);
  // Filter bar
  let fb='<div class="fbar">'
    +'<span class="flbl">Priorité</span>'
    +['all','h','n','l'].map(v=>'<div class="fchip'+(f.prio===v?' on':'')+'" onclick="setFil(\'prio\',\''+v+'\')">'+(v==='all'?'Toutes':v==='h'?'Haute':v==='n'?'Normale':'Basse')+'</div>').join('')
    +'<div class="fsep"></div><span class="flbl">Statut</span>'
    +['all','todo','in-progress','done'].map(v=>'<div class="fchip'+(f.status===v?' on':'')+'" onclick="setFil(\'status\',\''+v+'\')">'+(v==='all'?'Tous':SL[v])+'</div>').join('');
  if(ap.length){
    fb+='<div class="fsep"></div><span class="flbl">Projet</span>'
      +'<div class="fchip'+(f.proj==='all'?' on':'')+'" onclick="setFil(\'proj\',\'all\')">Tous</div>'
      +ap.map(p=>'<div class="fchip'+(f.proj===p.id?' on':'')+'" onclick="setFil(\'proj\',\''+p.id+'\')">'+p.emoji+' '+esc(p.name)+'</div>').join('');
  }
  fb+='</div>';
  if(!tasks.length)return fb+'<div class="empty"><div class="eit">🔍</div><div class="et">Aucune tâche</div><div class="es">Modifiez les filtres ou créez une nouvelle tâche.</div></div>';
  const ip=tasks.filter(t=>t.status==='in-progress');
  const td=tasks.filter(t=>t.status==='todo');
  const dn=tasks.filter(t=>t.status==='done');
  let h=fb;
  if(ip.length)h+=sh('⚡ En cours','',ip.length)+'<div class="tlist">'+ip.map(tc).join('')+'</div>';
  if(td.length)h+=sh('📋 À faire','',td.length)+'<div class="tlist">'+td.map(tc).join('')+'</div>';
  if(dn.length)h+=sh('✅ Terminé','var(--green)',dn.length)+'<div class="tlist">'+dn.map(tc).join('')+'</div>';
  return h;
}
function sh(title,color,count){return '<div class="sec-hdr"><span class="sec-t"'+(color?' style="color:'+color+'"':'')+'>'+title+'</span><span class="sec-c">'+count+'</span></div>';}

// ═══════════════════ TASK CARD ═══════════════════
function tc(t,noProj){
  const proj=t.projectId?gp(t.projectId):null;
  const dn=t.status==='done',dcc=dcls(t),pcc=pcls(t.priority),inTd=!!t.inToday,ext=isExt(t);
  const pp=(proj&&!noProj)?'<span class="pill pp" style="background:'+proj.color+'1A;color:'+proj.color+'">'+proj.emoji+' '+esc(proj.name)+'</span>':'';
  const sunBtn=(!inTd&&!dn&&S.tab!=='today')?'<button class="ta sun" onclick="addTd(\''+t.id+'\')">☀️</button>':'';
  const rmBtn=(inTd&&S.tab==='today')?'<button class="ta" onclick="rmTd(\''+t.id+'\')">✕</button>':'';
  return '<div class="tcard'+(dn?' dn':'')+'" style="padding-left:17px" onclick="openEditTask(\''+t.id+'\')">'
    +'<div class="pbar '+t.priority+'" onclick="event.stopPropagation()"></div>'
    +'<div class="tchk'+(dn?' ckd':'')+'" onclick="event.stopPropagation();togDone(\''+t.id+'\')"></div>'
    +'<div class="tbody">'
      +'<div class="tt">'+esc(t.title)+'</div>'
      +'<div class="tmeta">'+pp+'<span class="pill '+pcc+'">'+PL[t.priority]+'</span>'
      +(t.dueDate?'<span class="pill pdue '+dcc+'">📅 '+fmtD(t.dueDate)+'</span>':'')
      +(t.status==='in-progress'?'<span class="pill pip">⚡</span>':'')
      +(ext?'<span class="pill pext">👤 '+esc(t.assignee)+'</span>':'')
      +'</div>'
      +(t.notes?'<div class="tnote">'+esc(t.notes)+'</div>':'')
    +'</div>'
    +'<div class="tacts" onclick="event.stopPropagation()">'+sunBtn+rmBtn
    +'<button class="ta" onclick="openEditTask(\''+t.id+'\')">✏️</button>'
    +'<button class="ta del" onclick="delTask(\''+t.id+'\')">🗑</button>'
    +'</div></div>';
}

// ═══════════════════ PROJECTS ═══════════════════
function renderProj(){
  if(S.projDetailId)return renderProjDetail(S.projDetailId);
  const act=S.projects.filter(p=>!p.archived);
  const arc=S.projects.filter(p=>p.archived);
  let h='<div class="pgrid">';
  act.forEach(function(p){
    const pts=S.tasks.filter(t=>t.projectId===p.id);
    const dn=pts.filter(t=>t.status==='done').length;
    const tot=pts.length;
    const rem=pts.filter(t=>t.status!=='done');
    const pct=tot>0?Math.round(dn/tot*100):0;
    h+='<div class="pcard" onclick="openProjDetail(\''+p.id+'\')">'
      +'<div class="pcard-h"><div class="pcard-ico" style="background:'+p.color+'18">'+p.emoji+'</div>'
      +'<div><div class="pcard-n">'+esc(p.name)+'</div><div class="pcard-ct">'+tot+' tâche'+(tot!==1?'s':'')+' · '+rem.length+' restante'+(rem.length!==1?'s':'')+'</div></div></div>'
      +'<div class="pcard-b"><div class="pstats">'
      +'<div><div class="psn" style="color:'+p.color+'">'+rem.length+'</div><div class="psl">Restantes</div></div>'
      +'<div><div class="psn" style="color:var(--green)">'+dn+'</div><div class="psl">Terminées</div></div>'
      +'<div><div class="psn">'+pct+'%</div><div class="psl">Avancement</div></div>'
      +'</div><div class="pbar2"><div class="pbfill" style="width:'+pct+'%;background:'+p.color+'"></div></div>'
      +rem.slice(0,3).map(function(t){return '<div class="ptp"><div style="width:5px;height:5px;border-radius:50%;background:'+(t.priority==='h'?'var(--red)':t.priority==='n'?'var(--blue)':'var(--g300)')+';flex-shrink:0"></div><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(t.title)+'</span></div>';}).join('')
      +(rem.length>3?'<div style="font-size:11px;color:var(--teal);margin-top:5px;font-weight:500">→ '+(rem.length-3)+' de plus</div>':'')
      +'</div>'
      +'<div class="pcard-f" onclick="event.stopPropagation()">'
      +'<button class="pab" onclick="openTaskForProj(\''+p.id+'\')">+ Tâche</button>'
      +'<button class="pab" onclick="openEditProj(\''+p.id+'\')">Modifier</button>'
      +'<button class="pab dng" onclick="archProj(\''+p.id+'\')">Archiver</button>'
      +'</div></div>';
  });
  h+='<div class="add-pc" onclick="openProjModal()"><div style="font-size:30px">＋</div><span>Nouveau projet</span></div></div>';
  if(arc.length){
    h+='<div class="sec-hdr" style="margin-top:24px"><span class="sec-t">📦 Archivés</span></div><div class="tlist">';
    arc.forEach(function(p){
      h+='<div class="tcard" style="padding-left:14px"><div class="tbody"><div class="tt">'+p.emoji+' '+esc(p.name)+'</div></div>'
        +'<div class="tacts" style="opacity:1"><button class="ta" onclick="unarchProj(\''+p.id+'\')">↩️</button><button class="ta del" onclick="delProj(\''+p.id+'\')">🗑</button></div></div>';
    });
    h+='</div>';
  }
  return h;
}

// ═══════════════════ PROJECT DETAIL ═══════════════════
// NOTE: Pas de template literals ici pour éviter les problèmes de syntaxe
function openProjDetail(id){S.projDetailId=id;renderContent();}
function closeProjDetail(){S.projDetailId=null;renderContent();}

function renderProjDetail(id){
  var proj=gp(id);
  if(!proj)return renderProj();
  var tasks=S.tasks.filter(function(t){return t.projectId===id;});
  var tot=tasks.length;
  var dn=tasks.filter(function(t){return t.status==='done';}).length;
  var rem=tasks.filter(function(t){return t.status!=='done';}).length;
  var ip=tasks.filter(function(t){return t.status==='in-progress';}).length;
  var ov=tasks.filter(isOv).length;
  var pct=tot>0?Math.round(dn/tot*100):0;

  // Construire le sous-titre sans template literals imbriqués
  var sub=tot+(tot!==1?' tâches':' tâche')+' au total';
  if(ov)sub+=' · <span style="color:var(--red);font-weight:600">'+ov+' en retard</span>';
  if(ip)sub+=' · '+ip+' en cours';

  sortTasks(tasks);
  var tIP=tasks.filter(function(t){return t.status==='in-progress';});
  var tTD=tasks.filter(function(t){return t.status==='todo';});
  var tDN=tasks.filter(function(t){return t.status==='done';});

  var h='<div class="pd-hdr">'
    +'<button class="btn-back" onclick="closeProjDetail()">← Retour</button>'
    +'<span class="bc">Projets › <strong>'+esc(proj.name)+'</strong></span>'
    +'<div style="margin-left:auto;display:flex;gap:7px">'
    +'<button class="btn-sec" onclick="openTaskForProj(\''+id+'\')">+ Tâche</button>'
    +'<button class="btn-sec" onclick="openEditProj(\''+id+'\')">⚙️</button>'
    +'</div></div>'
    +'<div class="pd-banner">'
    +'<div class="pdb-ico" style="background:'+proj.color+'18">'+proj.emoji+'</div>'
    +'<div style="flex:1;min-width:0">'
    +'<div class="pdb-name">'+esc(proj.name)+'</div>'
    +'<div class="pdb-sub">'+sub+'</div>'
    +'</div>'
    +'<div class="pdb-stats">'
    +'<div class="pds"><div class="pds-n" style="color:'+proj.color+'">'+rem+'</div><div class="pds-l">Restantes</div></div>'
    +'<div class="pds"><div class="pds-n" style="color:var(--green)">'+dn+'</div><div class="pds-l">Terminées</div></div>'
    +'<div class="pdb-prog"><div class="pdb-prog-lbl" style="color:'+proj.color+'">'+pct+'%</div><div class="pdb-bar"><div class="pdb-fill" style="width:'+pct+'%;background:'+proj.color+'"></div></div></div>'
    +'</div></div>';

  if(!tot)return h+'<div class="empty"><div class="eit">📭</div><div class="et">Aucune tâche</div><div class="es">Ce projet n\'a pas encore de tâches.</div><button class="btn-pri" style="margin-top:14px" onclick="openTaskForProj(\''+id+'\')">+ Ajouter une tâche</button></div>';
  if(tIP.length)h+=sh('⚡ En cours','',tIP.length)+'<div class="tlist">'+tIP.map(function(t){return tc(t,true);}).join('')+'</div>';
  if(tTD.length)h+=sh('📋 À faire','',tTD.length)+'<div class="tlist">'+tTD.map(function(t){return tc(t,true);}).join('')+'</div>';
  if(tDN.length)h+=sh('✅ Terminé','var(--green)',tDN.length)+'<div class="tlist">'+tDN.map(function(t){return tc(t,true);}).join('')+'</div>';
  return h;
}

// ═══════════════════ KANBAN ═══════════════════
function setKTab(k){S.kTab=k;renderContent();}
function renderKanban(){
  var cols=[{k:'todo',lb:'À faire',c:'k-todo'},{k:'in-progress',lb:'En cours',c:'k-ip'},{k:'done',lb:'Terminé',c:'k-dn'}];
  var tabs='<div class="k-tabs"><div class="k-tab-row">'
    +cols.map(function(col){
      var n=S.tasks.filter(function(t){return t.status===col.k;}).length;
      return '<div class="k-tab'+(S.kTab===col.k?' on':'')+'" onclick="setKTab(\''+col.k+'\')">'+col.lb+' ('+n+')</div>';
    }).join('')
    +'</div></div>';
  var h=tabs+'<div class="kboard">';
  cols.forEach(function(col){
    var ts=S.tasks.filter(function(t){return t.status===col.k;});
    var active=S.kTab===col.k;
    h+='<div class="kcol '+col.c+(active?' k-active':'')+'"><div class="kcol-hdr"><div class="kdot"></div><div class="kcol-t">'+col.lb+'</div><div class="kcol-c">'+ts.length+'</div></div>'
      +'<div class="ktasks">'+(ts.length?ts.map(kc).join(''):'<div class="k-empty">Aucune tâche</div>')+'</div></div>';
  });
  return h+'</div>';
}
function kc(t){
  var proj=t.projectId?gp(t.projectId):null,dcc=dcls(t);
  return '<div class="kcard" onclick="openEditTask(\''+t.id+'\')"><div style="display:flex;align-items:flex-start;gap:6px;margin-bottom:5px">'
    +'<div style="width:3px;min-height:14px;border-radius:3px;background:'+(t.priority==='h'?'var(--red)':t.priority==='n'?'var(--blue)':'var(--g300)')+';flex-shrink:0;margin-top:3px;align-self:stretch"></div>'
    +'<div class="kcard-t">'+esc(t.title)+'</div></div>'
    +'<div class="kcard-m">'
    +(proj?'<span class="pill pp" style="font-size:10px;padding:1px 6px;background:'+proj.color+'1A;color:'+proj.color+'">'+proj.emoji+'</span>':'')
    +(t.dueDate?'<span class="pill pdue '+dcc+'" style="font-size:10px;padding:1px 6px">📅 '+fmtD(t.dueDate)+'</span>':'')
    +'<span style="margin-left:auto" class="avy'+(isExt(t)?' ext':'')+'">'+ini(t.assignee||'Moi')+'</span>'
    +'</div></div>';
}

// ═══════════════════ TASK MODAL ═══════════════════
function openTaskModal(){
  S.editTaskId=null;S.prio='h';S.defProjId=null;
  document.getElementById('m-title').textContent='Nouvelle tâche';
  ['f-title','f-assign','f-notes'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('f-due').value='';
  document.getElementById('f-today').checked=S.tab==='today';
  document.getElementById('f-status').value='todo';
  updPrio('h');fillPS(null);
  document.getElementById('task-ov').classList.add('open');
  setTimeout(function(){document.getElementById('f-title').focus();},120);
}
function openTaskForProj(pid){openTaskModal();S.defProjId=pid;fillPS(pid);}
function openEditTask(id){
  var t=S.tasks.find(function(t){return t.id===id;});if(!t)return;
  S.editTaskId=id;S.prio=t.priority;
  document.getElementById('m-title').textContent='Modifier';
  document.getElementById('f-title').value=t.title;
  document.getElementById('f-assign').value=t.assignee||'';
  document.getElementById('f-notes').value=t.notes||'';
  document.getElementById('f-due').value=t.dueDate||'';
  document.getElementById('f-today').checked=!!t.inToday;
  document.getElementById('f-status').value=t.status;
  updPrio(t.priority);fillPS(t.projectId);
  document.getElementById('task-ov').classList.add('open');
}
function fillPS(sel){
  var s=document.getElementById('f-proj');
  s.innerHTML='<option value="">Aucun projet</option>'
    +S.projects.filter(function(p){return !p.archived;}).map(function(p){
      return '<option value="'+p.id+'"'+(p.id===(sel||S.defProjId)?' selected':'')+'>'+p.emoji+' '+esc(p.name)+'</option>';
    }).join('');
}
function updPrio(p){
  S.prio=p;
  document.querySelectorAll('.pio').forEach(function(el){el.classList.toggle('sel',el.classList.contains(p));});
}
function selPrio(p){updPrio(p);}
function closeTaskModal(){document.getElementById('task-ov').classList.remove('open');}
function saveTask(){
  var title=document.getElementById('f-title').value.trim();
  if(!title){document.getElementById('f-title').focus();return;}
  var d={
    title:title,
    projectId:document.getElementById('f-proj').value||null,
    assignee:document.getElementById('f-assign').value.trim()||'Moi',
    priority:S.prio,
    dueDate:document.getElementById('f-due').value||null,
    status:document.getElementById('f-status').value,
    inToday:document.getElementById('f-today').checked,
    notes:document.getElementById('f-notes').value.trim()
  };
  if(S.editTaskId){
    var i=S.tasks.findIndex(function(t){return t.id===S.editTaskId;});
    if(i!==-1)S.tasks[i]=Object.assign({},S.tasks[i],d);
    toast('✅ Tâche mise à jour');
  }else{
    S.tasks.push(Object.assign({id:uid(),createdAt:new Date().toISOString()},d));
    toast('✅ Tâche créée');
  }
  save();closeTaskModal();renderAll();
}
function togDone(id){
  var t=S.tasks.find(function(t){return t.id===id;});if(!t)return;
  t.status=t.status==='done'?'todo':'done';save();renderAll();
}
function addTd(id){
  var t=S.tasks.find(function(t){return t.id===id;});if(!t)return;
  t.inToday=true;save();renderAll();toast('☀️ Ajouté');
}
function rmTd(id){
  var t=S.tasks.find(function(t){return t.id===id;});if(!t)return;
  t.inToday=false;save();renderAll();
}
function delTask(id){
  if(!confirm('Supprimer cette tâche ?'))return;
  S.tasks=S.tasks.filter(function(t){return t.id!==id;});
  save();renderAll();toast('🗑 Supprimée');
}

// ═══════════════════ PROJECT MODAL ═══════════════════
function openProjModal(){
  S.editProjId=null;
  S.pColor=COLORS[Math.floor(Math.random()*COLORS.length)];
  S.pEmoji=EMOJIS[0];
  document.getElementById('pm-title').textContent='Nouveau projet';
  document.getElementById('fp-name').value='';
  rSw();rEm();
  document.getElementById('proj-ov').classList.add('open');
  setTimeout(function(){document.getElementById('fp-name').focus();},120);
}
function openEditProj(id){
  var p=S.projects.find(function(p){return p.id===id;});if(!p)return;
  S.editProjId=id;S.pColor=p.color;S.pEmoji=p.emoji;
  document.getElementById('pm-title').textContent='Modifier le projet';
  document.getElementById('fp-name').value=p.name;
  rSw();rEm();document.getElementById('proj-ov').classList.add('open');
}
function rSw(){
  document.getElementById('swatches').innerHTML=COLORS.map(function(c){
    return '<div class="sw'+(c===S.pColor?' sel':'')+'" style="background:'+c+'" onclick="pickC(\''+c+'\')"></div>';
  }).join('');
}
function rEm(){
  document.getElementById('epick').innerHTML=EMOJIS.map(function(e){
    return '<div class="ep'+(e===S.pEmoji?' sel':'')+'" onclick="pickE(\''+e+'\')">'+e+'</div>';
  }).join('');
}
function pickC(c){S.pColor=c;rSw();}
function pickE(e){S.pEmoji=e;rEm();}
function closeProjModal(){document.getElementById('proj-ov').classList.remove('open');}
function saveProj(){
  var name=document.getElementById('fp-name').value.trim();
  if(!name){document.getElementById('fp-name').focus();return;}
  if(S.editProjId){
    var i=S.projects.findIndex(function(p){return p.id===S.editProjId;});
    if(i!==-1)Object.assign(S.projects[i],{name:name,color:S.pColor,emoji:S.pEmoji});
    toast('✅ Projet mis à jour');
  }else{
    S.projects.push({id:uid(),name:name,color:S.pColor,emoji:S.pEmoji,archived:false,createdAt:new Date().toISOString()});
    toast('✅ Projet créé');
  }
  save();closeProjModal();renderAll();
}
function archProj(id){
  if(!confirm('Archiver ?'))return;
  var p=S.projects.find(function(p){return p.id===id;});
  if(p){p.archived=true;if(S.projDetailId===id)S.projDetailId=null;save();renderAll();toast('📦 Archivé');}
}
function unarchProj(id){
  var p=S.projects.find(function(p){return p.id===id;});
  if(p){p.archived=false;save();renderAll();toast('↩️ Restauré');}
}
function delProj(id){
  if(!confirm('Supprimer ce projet ?'))return;
  S.projects=S.projects.filter(function(p){return p.id!==id;});
  S.tasks.forEach(function(t){if(t.projectId===id)t.projectId=null;});
  if(S.projDetailId===id)S.projDetailId=null;
  save();renderAll();toast('🗑 Supprimé');
}

// ═══════════════════ FILTERS + MISC ═══════════════════
function setFil(k,v){S.fil[k]=v;renderContent();}
function gotoOv(){switchTab('all');S.fil.status='todo';renderContent();}
function ovClick(e,id){if(e.target.id===id){if(id==='task-ov')closeTaskModal();else closeProjModal();}}
function exportJSON(){
  var b=new Blob([JSON.stringify({tasks:S.tasks,projects:S.projects,exportedAt:new Date().toISOString()},null,2)],{type:'application/json'});
  var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='taskboard-'+todayStr()+'.json';a.click();
  toast('📦 Export téléchargé');
}

// ═══════════════════ KEYBOARD ═══════════════════
document.addEventListener('keydown',function(e){
  var tag=document.activeElement.tagName;
  if(e.key==='Escape'){
    closeTaskModal();closeProjModal();
    if(S.projDetailId)closeProjDetail();
  }
  if((e.metaKey||e.ctrlKey)&&e.key==='Enter'){
    if(document.getElementById('task-ov').classList.contains('open'))saveTask();
    if(document.getElementById('proj-ov').classList.contains('open'))saveProj();
  }
  if(!['INPUT','TEXTAREA','SELECT'].includes(tag)&&!e.metaKey&&!e.ctrlKey){
    if(e.key==='n')openTaskModal();
    if(e.key==='1')switchTab('today');
    if(e.key==='2')switchTab('all');
    if(e.key==='3')switchTab('projects');
    if(e.key==='4')switchTab('kanban');
  }
});

// ═══════════════════ INIT ═══════════════════
function init(){
  load();
  var el=document.getElementById('sb-date');
  if(el)el.textContent=new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'short'});
  renderAll();
}
init();
</script>
</body>
